services:
  postgres:
    image: postgres:16
    container_name: agile-cms-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cms
    ports:
      - '5432:5432'
    volumes:
      - cms-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d cms']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  cms-pgdata:
